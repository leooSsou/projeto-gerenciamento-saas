version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: saas_postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres_password
      POSTGRES_DB: gerenciador_saas
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: saas_redis
    restart: always
    ports:
      - "6380:6379"
    volumes:
      - redis_data:/data

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: saas_backend
    restart: always
    ports:
      - "8000:8000"
    volumes:
      - .:/app
    environment:
      DATABASE_URL: "postgresql://postgres:postgres_password@postgres:5432/gerenciador_saas"
      DATABASE_TEST_URL: "sqlite:///:memory:"
    depends_on:
      - postgres
      - redis

volumes:
  postgres_data:
  redis_data:
